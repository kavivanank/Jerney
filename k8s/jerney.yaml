# ==============================================================
# Jerney Blog Platform - Kubernetes Manifest (Corrected Version)
# Includes:
# - Namespace
# - Secret
# - StorageClass
# - PVC
# - PostgreSQL
# - Backend
# - Frontend
# - Network Policies
# ==============================================================

# --------------------------------------------------------------
# Namespace
# --------------------------------------------------------------
apiVersion: v1
kind: Namespace
metadata:
  name: jerney
  labels:
    app.kubernetes.io/part-of: jerney

---
# --------------------------------------------------------------
# Secret for PostgreSQL Credentials
# --------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: jerney-db-secret
  namespace: jerney
  labels:
    app.kubernetes.io/part-of: jerney
type: Opaque
data:
  POSTGRES_USER: amVybmV5X3VzZXI=         # jerney_user
  POSTGRES_PASSWORD: amVybmV5X3Bhc3NfMjAyNg== # jerney_pass_2026
  POSTGRES_DB: amVybmV5X2Ri               # jerney_db

---
# --------------------------------------------------------------
# StorageClass (EBS CSI)
# --------------------------------------------------------------
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: jerney-ebs-sc
provisioner: ebs.csi.eks.amazonaws.com
parameters:
  type: gp3
  encrypted: "true"
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true

---
# --------------------------------------------------------------
# PostgreSQL Persistent Volume Claim
# --------------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jerney-db-pvc
  namespace: jerney
  labels:
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: jerney-ebs-sc
  resources:
    requests:
      storage: 10Gi

---
# --------------------------------------------------------------
# PostgreSQL Deployment
# --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-db
  namespace: jerney
  labels:
    app.kubernetes.io/name: jerney-db
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: database

spec:
  replicas: 1

  strategy:
    type: Recreate

  selector:
    matchLabels:
      app.kubernetes.io/name: jerney-db

  template:
    metadata:
      labels:
        app.kubernetes.io/name: jerney-db
        app.kubernetes.io/part-of: jerney
        app.kubernetes.io/component: database

    spec:
      automountServiceAccountToken: false

      securityContext:
        fsGroup: 999

      containers:
        - name: postgres
          image: postgres:16-alpine

          ports:
            - containerPort: 5432
              protocol: TCP

          envFrom:
            - secretRef:
                name: jerney-db-secret

          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
              subPath: postgres

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3

      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: jerney-db-pvc

---
# --------------------------------------------------------------
# PostgreSQL Service
# --------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: jerney-db
  namespace: jerney
  labels:
    app.kubernetes.io/name: jerney-db
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: database

spec:
  type: ClusterIP

  selector:
    app.kubernetes.io/name: jerney-db

  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP

---
# --------------------------------------------------------------
# Backend Deployment
# --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-backend
  namespace: jerney
  labels:
    app.kubernetes.io/name: jerney-backend
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: jerney-backend

  template:
    metadata:
      labels:
        app.kubernetes.io/name: jerney-backend
        app.kubernetes.io/part-of: jerney
        app.kubernetes.io/component: backend

    spec:
      automountServiceAccountToken: false

      initContainers:
        - name: wait-for-db
          image: postgres:16-alpine

          command:
            - sh
            - -c
            - |
              until pg_isready -h jerney-db -p 5432; do
                echo "Waiting for database..."
                sleep 3
              done
              echo "Database ready"

          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi

      containers:
        - name: backend
          image: kavi2510/jerney-backend:latest

          ports:
            - containerPort: 5000
              protocol: TCP

          env:
            - name: PORT
              value: "5000"

            - name: DB_HOST
              value: "jerney-db"

            - name: DB_PORT
              value: "5432"

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_PASSWORD

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: jerney-db-secret
                  key: POSTGRES_DB

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000

            capabilities:
              drop:
                - ALL

          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5

          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3

---
# --------------------------------------------------------------
# Backend Service
# --------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: jerney-backend
  namespace: jerney
  labels:
    app.kubernetes.io/name: jerney-backend
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: backend

spec:
  type: ClusterIP

  selector:
    app.kubernetes.io/name: jerney-backend

  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP

---
# --------------------------------------------------------------
# Frontend Deployment
# --------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jerney-frontend
  namespace: jerney
  labels:
    app.kubernetes.io/name: jerney-frontend
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: jerney-frontend

  template:
    metadata:
      labels:
        app.kubernetes.io/name: jerney-frontend
        app.kubernetes.io/part-of: jerney
        app.kubernetes.io/component: frontend

    spec:
      automountServiceAccountToken: false

      containers:
        - name: frontend
          image: kavi2510/jerney-frontend:latest

          ports:
            - containerPort: 8080
              protocol: TCP

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 101

            capabilities:
              drop:
                - ALL

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5

---
# --------------------------------------------------------------
# Frontend Service
# --------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: jerney-frontend
  namespace: jerney
  labels:
    app.kubernetes.io/name: jerney-frontend
    app.kubernetes.io/part-of: jerney
    app.kubernetes.io/component: frontend

spec:
  type: NodePort

  selector:
    app.kubernetes.io/name: jerney-frontend

  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
      protocol: TCP

---
# --------------------------------------------------------------
# NetworkPolicy:
# Allow Backend -> PostgreSQL
# --------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jerney-db-allow-backend-only
  namespace: jerney

spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jerney-db

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jerney-backend

      ports:
        - protocol: TCP
          port: 5432

---
# --------------------------------------------------------------
# NetworkPolicy:
# Allow Frontend -> Backend
# --------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jerney-backend-allow-frontend-only
  namespace: jerney

spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jerney-backend

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: jerney-frontend

      ports:
        - protocol: TCP
          port: 5000